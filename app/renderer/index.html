<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VDO.MultiCh.Comms</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: #111; border-bottom: 1px solid #333; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    header button { background: #333; border: none; color: #ccc; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    header button:hover { background: #444; }

    #lines { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; flex: 1; }

    .line-panel { background: #242424; border: 1px solid #333; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .line-panel h2 { font-size: 14px; font-weight: 600; }

    /* Inline-editable name and location */
    .editable-name, .editable-location { outline: none; border-bottom: 1px dotted #555; cursor: text; }
    .editable-name:focus, .editable-location:focus { border-bottom-color: #4caf50; }
    .editable-name:empty:before { content: attr(data-placeholder); color: #666; }
    .location-row { min-height: 16px; }
    .editable-location { font-size: 11px; color: #888; display: inline-block; min-width: 60px; }
    .editable-location:empty:before { content: attr(data-placeholder); color: #555; font-style: italic; }

    /* Device label in header */
    #device-label { font-size: 12px; color: #888; }

    .meter { height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    .meter-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.1s; border-radius: 4px; }

    .gain-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; }
    .gain-row input[type=range] { flex: 1; accent-color: #4caf50; }

    .join-section { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .join-section img.qr { width: 120px; height: 120px; border-radius: 4px; background: #fff; padding: 4px; }
    .join-section .copy-row { display: flex; gap: 6px; width: 100%; }
    .join-section .copy-row input { flex: 1; font-size: 11px; background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-family: monospace; min-width: 0; }
    .join-section .copy-row button { font-size: 11px; background: #333; border: none; color: #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .join-section .copy-row button:hover { background: #444; }

    .channel-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; }
    .channel-row label { width: 24px; }
    .channel-row select { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 4px 6px; border-radius: 4px; font-size: 12px; }

    .connect-btn { padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #2a5c2a; color: #7ec87e; transition: background 0.2s; }
    .connect-btn.connected { background: #5c2a2a; color: #c87e7e; }
    .connect-btn:hover { filter: brightness(1.2); }

    .director-row { display: flex; align-items: center; gap: 6px; padding-top: 6px; border-top: 1px solid #2e2e2e; }
    .director-label { font-size: 11px; color: #666; white-space: nowrap; }
    .director-link { font-size: 12px; color: #4a8a6a; text-decoration: none; }
    .director-link:hover { color: #7ec87e; text-decoration: underline; }
    .director-row button { font-size: 11px; background: #333; border: none; color: #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .director-row button:hover { background: #444; }

    /* Settings overlay */
    #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
    #settings-overlay.open { display: flex; }
    .settings-box { background: #242424; border: 1px solid #333; border-radius: 10px; padding: 24px; width: 420px; display: flex; flex-direction: column; gap: 16px; }
    .settings-box h2 { font-size: 15px; font-weight: 600; }
    .settings-row { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .settings-row label { color: #aaa; }
    .settings-row select, .settings-row input[type=text] { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px; border-radius: 4px; font-size: 13px; }
    .settings-row .url-row { display: flex; gap: 6px; }
    .settings-row .url-row input { flex: 1; }
    .test-btn { background: #333; border: none; color: #ccc; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .test-btn:hover { background: #444; }
    .test-status { font-size: 11px; min-height: 16px; }
    .test-status.ok { color: #4caf50; }
    .test-status.fail { color: #f44336; }
    .settings-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .settings-actions button { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; }
    .btn-save { background: #2a5c2a; color: #7ec87e; }
    .btn-cancel { background: #333; color: #ccc; }

    /* Session section in settings */
    .settings-divider { border: none; border-top: 1px solid #333; margin: 4px 0; }
    .settings-section-heading { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .session-code-area { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px; border-radius: 4px; font-size: 11px; font-family: monospace; resize: none; height: 64px; }
    .session-copy-btn { align-self: flex-start; background: #2a5c2a; border: none; color: #7ec87e; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .session-copy-btn:hover { filter: brightness(1.2); }
    .session-msg { font-size: 11px; min-height: 16px; color: #4caf50; }
    .session-import-area { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px; border-radius: 4px; font-size: 11px; font-family: monospace; resize: none; height: 64px; }
    .session-apply-btn { align-self: flex-start; background: #333; border: none; color: #ccc; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .session-apply-btn:hover { background: #444; }
    .session-import-msg { font-size: 11px; min-height: 16px; }
    .session-import-msg.ok { color: #4caf50; }
    .session-import-msg.fail { color: #f44336; }

    /* First-run setup modal */
    #setup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 200; }
    #setup-overlay.open { display: flex; }
    .setup-card { background: #242424; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 480px; display: flex; flex-direction: column; gap: 20px; }
    .setup-card h2 { font-size: 18px; font-weight: 600; text-align: center; }
    .setup-card p { font-size: 13px; color: #aaa; text-align: center; }
    .setup-btn-row { display: flex; gap: 12px; justify-content: center; }
    .setup-btn { flex: 1; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
    .setup-btn-new { background: #2a5c2a; color: #7ec87e; }
    .setup-btn-join { background: #333; color: #ccc; }
    .setup-btn:hover { filter: brightness(1.2); }
    #setup-join-section { display: none; flex-direction: column; gap: 10px; }
    #setup-join-section.visible { display: flex; }
    #setup-step-2 { display: none; }
    #setup-step-2.visible { display: flex; flex-direction: column; gap: 16px; }
    .setup-field-row { display: flex; flex-direction: column; gap: 6px; }
    .setup-field-row label { font-size: 12px; color: #aaa; }
    .setup-field-row input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 14px; }
    .setup-field-row input:focus { outline: none; border-color: #4caf50; }
    .setup-preview { font-size: 11px; color: #555; font-family: monospace; min-height: 16px; }
    .setup-lines-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .setup-line-field { display: flex; flex-direction: column; gap: 4px; }
    .setup-line-field label { font-size: 11px; color: #666; }
    .setup-line-field input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 13px; }
    .setup-line-field input:focus { outline: none; border-color: #4caf50; }
    .setup-line-key { font-size: 10px; color: #555; font-family: monospace; min-height: 14px; }
    .setup-join-area { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px; border-radius: 4px; font-size: 12px; font-family: monospace; resize: none; height: 72px; }
    .setup-apply-btn { background: #2a5c2a; border: none; color: #7ec87e; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .setup-apply-btn:hover { filter: brightness(1.2); }
    .setup-msg { font-size: 12px; min-height: 16px; }
    .setup-msg.ok { color: #4caf50; }
    .setup-msg.fail { color: #f44336; }
  </style>
</head>
<body>
  <header>
    <h1>VDO.MultiCh.Comms</h1>
    <span id="device-label">Device: Default</span>
    <button id="open-settings">Settings</button>
  </header>

  <!-- First-run setup modal -->
  <div id="setup-overlay">
    <div class="setup-card">

      <!-- Step 1: new or join -->
      <div id="setup-step-1">
        <h2>Welcome to VDO.MultiCh.Comms</h2>
        <p>Are you setting up a new session or joining an existing one?</p>
        <div class="setup-btn-row">
          <button class="setup-btn setup-btn-new" id="setup-new">New Session</button>
          <button class="setup-btn setup-btn-join" id="setup-join-btn">Join Existing</button>
        </div>
        <div id="setup-join-section">
          <p style="font-size:12px;color:#888;text-align:left;">Paste the session code from the host instance:</p>
          <textarea class="setup-join-area" id="setup-join-code" placeholder="Paste session code here…"></textarea>
          <button class="setup-apply-btn" id="setup-apply">Apply &amp; Continue</button>
          <div class="setup-msg" id="setup-msg"></div>
        </div>
      </div>

      <!-- Step 2: name your session and lines -->
      <div id="setup-step-2">
        <h2>Name your session</h2>
        <p>This becomes the prefix for all room keys — use something short and event-specific.</p>
        <div class="setup-field-row">
          <label>Event / session name</label>
          <input type="text" id="setup-event-name" placeholder="e.g. faire24, superbowl, show1" maxlength="20" />
          <div class="setup-preview" id="setup-key-preview"></div>
        </div>
        <div class="setup-lines-grid" id="setup-lines-grid">
          <!-- populated by JS -->
        </div>
        <button class="setup-apply-btn" id="setup-confirm" disabled>Create Session</button>
        <div class="setup-msg" id="setup-step2-msg"></div>
      </div>

    </div>
  </div>

  <div id="lines"></div>

  <div id="settings-overlay">
    <div class="settings-box">
      <h2>Settings</h2>
      <div class="settings-row">
        <label>Input device (microphone / line in)</label>
        <select id="input-device-select">
          <option value="">Default</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Output device (speakers / line out)</label>
        <select id="output-device-select">
          <option value="">Default</option>
        </select>
      </div>
      <div class="settings-row" style="flex-direction:row;align-items:center;gap:16px;">
        <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
          <label>Input channels <span id="input-ch-detected" style="font-size:10px;color:#555;"></span></label>
          <input type="number" id="input-ch-override" min="1" max="64" placeholder="Auto" style="width:80px;" />
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
          <label>Output channels <span id="output-ch-detected" style="font-size:10px;color:#555;"></span></label>
          <input type="number" id="output-ch-override" min="1" max="64" placeholder="Auto" style="width:80px;" />
        </div>
      </div>
      <div class="settings-row">
        <label>VDO.ninja endpoint</label>
        <select id="vdo-preset">
          <option value="https://vdo.ninja">VDO.ninja (public)</option>
          <option value="custom">Custom instance</option>
        </select>
      </div>
      <div class="settings-row" id="custom-url-row" style="display:none">
        <label>Custom URL</label>
        <div class="url-row">
          <input type="text" id="vdo-custom-url" placeholder="https://your-domain.com/live" />
          <button class="test-btn" id="test-url-btn">Test</button>
        </div>
        <div class="test-status" id="test-status"></div>
      </div>
      <hr class="settings-divider" />
      <div class="settings-section-heading">Session</div>
      <div class="settings-row">
        <label>Session code</label>
        <textarea class="session-code-area" id="session-export-code" readonly placeholder="Click Export to generate…"></textarea>
        <button class="session-copy-btn" id="session-export-btn">Export &amp; Copy</button>
        <div class="session-msg" id="session-export-msg"></div>
      </div>
      <div class="settings-row">
        <label>Import session</label>
        <textarea class="session-import-area" id="session-import-code" placeholder="Paste session code here…"></textarea>
        <button class="session-apply-btn" id="session-import-btn">Apply</button>
        <div class="session-import-msg" id="session-import-msg"></div>
      </div>
      <div class="settings-actions">
        <button class="btn-cancel" id="cancel-settings">Cancel</button>
        <button class="btn-save" id="save-settings">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
